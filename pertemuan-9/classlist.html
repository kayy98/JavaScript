<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class List - JS</title>
    <style>
        .box{
            background-color: cadetblue;
            width: 200px;
            height: 200px;
            margin: 10px;   
            transition: 0.7s;
        }
        .success{
             background-color: yellow;   
             margin: 0;
        }
    </style>
</head>
<body>
    <h1>class list di javascript</h1>

    <div id="target" class="box">Kotak Target</div>

    <button id="btn-add">Add class</button> 
    <button id="btn-remove">Remove class</button>
    <button id="btn-toggle">Toggle</button>
    <script src="./classlist.js"></script>
</body>
</html>
